services:
  grok2api:
    container_name: grok2api
    build:
      context: .
      dockerfile: Dockerfile
    image: grok2api-fork:local
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      SERVER_STORAGE_TYPE: ${SERVER_STORAGE_TYPE:-local}
      SERVER_STORAGE_URL: ${SERVER_STORAGE_URL:-}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://flaresolverr:8191}
      CF_REFRESH_INTERVAL: ${CF_REFRESH_INTERVAL:-600}
      CF_TIMEOUT: ${CF_TIMEOUT:-60}
    command:
      - sh
      - -c
      - >
        granian --interface asgi --host "$${SERVER_HOST:-0.0.0.0}"
        --port "$${SERVER_PORT:-8000}" --workers "$${SERVER_WORKERS:-1}" main:app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  # Opsi proxy egress. Aktifkan manual bila memang diperlukan, lalu arahkan
  # proxy.base_proxy_url ke socks5://warp:1080 pada konfigurasi aplikasi.
  warp:
    container_name: warp
    image: caomingjun/warp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:1080"
    environment:
      - WARP_SLEEP=2
    cap_add:
      - NET_ADMIN
    profiles:
      - warp

  # FlareSolverr untuk membantu refresh challenge Cloudflare.
  # Set ENABLE_FLARESOLVERR=true kalau memang diperlukan.
  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    profiles:
      - flaresolverr
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
    restart: unless-stopped
